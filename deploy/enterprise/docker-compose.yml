version: '3.8'

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: blde-api-enterprise
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_MODE=pg
      - DB_HOST=rds-postgres-instance.c123456789.us-east-1.rds.amazonaws.com
      - DB_PORT=5432
      - DB_USER=blde_enterprise_db_user
      - DB_PASSWORD=SecretEnterprisePasswordSecure99!
      - DB_NAME=blde_edc_prod
      - DB_SSL=true
      - JWT_SECRET=SecretEncryptionKey998!
      - UPLOAD_DIR=/usr/src/app/uploads
      - STORAGE_PROVIDER=s3
      - S3_ENDPOINT=https://s3.us-east-1.amazonaws.com
      - S3_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
      - S3_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      - S3_BUCKET=blde-edc-production-attachments
      - ENABLE_AI=true
      - ENABLE_ORTHANC=true
    ports:
      - "3001:3001"
    volumes:
      - uploads:/usr/src/app/uploads

  nginx:
    image: nginx:1.25-alpine
    container_name: blde-nginx-enterprise
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs
    depends_on:
      - backend

volumes:
  uploads:
  certs:

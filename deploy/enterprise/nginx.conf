server {
    listen 80;
    server_name medical-cloud.blde.edu www.medical-cloud.blde.edu;

    # Enforce HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medical-cloud.blde.edu www.medical-cloud.blde.edu;

    ssl_certificate /etc/nginx/certs/blde_edc_chain.crt;
    ssl_certificate_key /etc/nginx/certs/blde_edc_key.key;

    # High-security SSL parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API Gateway routing
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploads attachments routing
    location /uploads/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
    }

    # PACS DICOM Integration gateway
    location /orthanc/ {
        proxy_pass http://orthanc:8042/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blde-db-lab
    restart: always
    environment:
      POSTGRES_USER: blde_admin
      POSTGRES_PASSWORD: LabSecurePassword123!
      POSTGRES_DB: blde_edc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blde_admin -d blde_edc_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: blde-api-lab
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_MODE=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=blde_admin
      - DB_PASSWORD=LabSecurePassword123!
      - DB_NAME=blde_edc_db
      - JWT_SECRET=SecretEncryptionKey998!
      - UPLOAD_DIR=/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/usr/src/app/uploads

  frontend:
    image: nginx:1.25-alpine
    container_name: blde-web-lab
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ../../frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:

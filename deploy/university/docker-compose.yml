version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blde-db-univ
    restart: always
    environment:
      POSTGRES_USER: blde_univ_admin
      POSTGRES_PASSWORD: SecureUnivPassword123!
      POSTGRES_DB: blde_edc_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blde_univ_admin -d blde_edc_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-50Z
    container_name: blde-minio-univ
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: MinioSecurePassword123!
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  orthanc:
    image: jodogne/orthanc-plugins:1.12.3
    container_name: blde-orthanc-univ
    restart: always
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      - ORTHANC_NAME=BLDE_PACS
    volumes:
      - orthancdata:/var/lib/orthanc/db

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: blde-api-univ
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_MODE=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=blde_univ_admin
      - DB_PASSWORD=SecureUnivPassword123!
      - DB_NAME=blde_edc_db
      - JWT_SECRET=SecretEncryptionKey998!
      - UPLOAD_DIR=/usr/src/app/uploads
      - STORAGE_PROVIDER=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minio_admin
      - S3_SECRET_KEY=MinioSecurePassword123!
      - S3_BUCKET=blde-edc-attachments
      - ENABLE_AI=true
      - ENABLE_ORTHANC=true
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      orthanc:
        condition: service_started
    volumes:
      - uploads:/usr/src/app/uploads

  nginx:
    image: nginx:1.25-alpine
    container_name: blde-nginx-univ
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
  orthancdata:
  uploads:
  certs:
